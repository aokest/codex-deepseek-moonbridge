# ============================================================
# Provider 定义
# ============================================================
# 每个 provider 对应一个上游 API 服务。
# base_url 和 api_key 是核心字段。
# offers 中列出该 provider 支持的模型及其定价。
providers:
  # Provider A：DeepSeek 自有 Key（Anthropic 兼容协议）
  # 注意 base_url 是 /anthropic 而非 /v1
  deepseek:
    base_url: "https://api.deepseek.com/anthropic"
    api_key: "sk-你的DeepSeek密钥"  # ← 替换为你的 Key
    version: "2023-06-01"
    user_agent: "moonbridge/1.0"
    offers:
      - model: deepseek-v4-flash
        pricing:
          input_price: 0.14
          output_price: 0.28
          cache_write_price: 0.14
          cache_read_price: 0.0028
      - model: deepseek-v4-pro
        pricing:
          input_price: 2
          output_price: 8
          cache_write_price: 1
          cache_read_price: 0.2

  # Provider B：九天（中国移动，标准 OpenAI Chat Completions 协议）
  # 认证方式：Authorization: Bearer <JWT>
  # 关键配置：
  #   - protocol: "openai-chat" — 必须显式声明，默认 "anthropic" 会导致 401
  #   - api_version: "v3" — 九天 API 路径为 /v3/chat/completions（非 /v1/）
  #   - base_url 不含 /v3 后缀 — api_version 会自动拼接路径
  # 如果 Moon Bridge 版本较旧（不含 api_version 支持），需手动 patch 源码，
  # 详见 SETUP.md 第九步「调试方法论与深度排查」。
  jiutian:
    base_url: "https://jiutian.10086.cn/largemodel/moma/api"
    api_key: "你的九天JWT密钥"  # ← 替换为你的 JWT Key
    version: "2023-06-01"
    protocol: "openai-chat"
    api_version: "v3"
    user_agent: "moonbridge/1.0"
    offers:
      - model: deepseek/deepseek-v3
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: deepseek/deepseek-v32
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: deepseek/deepseek-r1
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: deepseek/deepseek-v4-flash
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: qwen/qwen3.5-27b
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: qwen/qwen3.6-35b
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: qwen/qwen3-235b-a22b-2507
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: qwen/qwen3.5-397b-a17b
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: qwen/qwen3-next-80b-a3b-instruct
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: moonshotai/kimi-k2.5-thinking
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: moonshotai/kimi-k2.6
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: minimax/minimax-latest
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: minimax/minimax-m2.5
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: minimax/minimax-m2.7
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: z.ai/glm-5
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: z.ai/glm-5.1
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: nvidia/nemotron-3-super-120b-a12b
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: stepfun/step-3.5-flash
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: openai/gpt-oss-120b
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}
      - model: jiutian/jiutian-lan-236b
        pricing: {input_price: 0, output_price: 0, cache_write_price: 0, cache_read_price: 0}

# ============================================================
# 路由定义（Codex 中通过 /model <slug> 切换）
# ============================================================
# slug → model（上游模型 ID）+ provider（上游服务）
# RouteEntry.Model 直接作为上游 API 的 model 参数，必须匹配！
routes:
  # DeepSeek 自有 Key
  moonbridge-flash:
    model: deepseek-v4-flash
    provider: deepseek
  moonbridge:
    model: deepseek-v4-pro
    provider: deepseek

  # 九天 - DeepSeek 系列
  jt-ds-v3:
    model: deepseek/deepseek-v3
    provider: jiutian
  jt-ds-v32:
    model: deepseek/deepseek-v32
    provider: jiutian
  jt-ds-r1:
    model: deepseek/deepseek-r1
    provider: jiutian
  jt-ds-v4-flash:
    model: deepseek/deepseek-v4-flash
    provider: jiutian

  # 九天 - Qwen 系列
  jt-qwen3.5-27b:
    model: qwen/qwen3.5-27b
    provider: jiutian
  jt-qwen3.6-35b:
    model: qwen/qwen3.6-35b
    provider: jiutian
  jt-qwen3-235b:
    model: qwen/qwen3-235b-a22b-2507
    provider: jiutian
  jt-qwen3.5-397b:
    model: qwen/qwen3.5-397b-a17b
    provider: jiutian
  jt-qwen3-next-80b:
    model: qwen/qwen3-next-80b-a3b-instruct
    provider: jiutian

  # 九天 - Kimi/Moonshot 系列
  jt-kimi-k2.5:
    model: moonshotai/kimi-k2.5-thinking
    provider: jiutian
  jt-kimi-k2.6:
    model: moonshotai/kimi-k2.6
    provider: jiutian

  # 九天 - MiniMax 系列
  jt-minimax-latest:
    model: minimax/minimax-latest
    provider: jiutian
  jt-minimax-m2.5:
    model: minimax/minimax-m2.5
    provider: jiutian
  jt-minimax-m2.7:
    model: minimax/minimax-m2.7
    provider: jiutian

  # 九天 - GLM 系列
  jt-glm-5:
    model: z.ai/glm-5
    provider: jiutian
  jt-glm-5.1:
    model: z.ai/glm-5.1
    provider: jiutian

  # 九天 - 其他模型
  jt-nemotron:
    model: nvidia/nemotron-3-super-120b-a12b
    provider: jiutian
  jt-step-3.5-flash:
    model: stepfun/step-3.5-flash
    provider: jiutian
  jt-gpt-oss-120b:
    model: openai/gpt-oss-120b
    provider: jiutian
  jt-jiutian-lan:
    model: jiutian/jiutian-lan-236b
    provider: jiutian

  # Codex 内置自动审核模型 — 必须配置！
  # Codex 执行高风险操作前，会调用 codex-auto-review 模型做安全审查。
  # 如果 Moon Bridge 路由表没有此条目，审核请求返回 404，
  # Codex 会将"审核失败"视为"拒绝"，导致大量操作被拦截。
  # 指向你最强的模型即可（推理能力越好，审核越准确）。
  codex-auto-review:
    model: deepseek-v4-pro
    provider: deepseek
