mode: "Transform"

log:
  level: "info"
  format: "text"

server:
  addr: "127.0.0.1:38440"

persistence:
  active_provider: db_sqlite

extensions:
  deepseek_v4:
    config:
      reinforce_instructions: true
      reinforce_prompt: "[System Reminder]: Please pay close attention to the system instructions, AGENTS.md files, and any other context provided. Follow them carefully and completely in your response.\n[User]:"
  db_sqlite:
    enabled: true
    config:
      path: ./data/moonbridge.db
      wal: true
      busy_timeout_ms: 5000
      max_open_conns: 1

cache:
  mode: "explicit"
  ttl: "5m"
  prompt_caching: true
  automatic_prompt_cache: false
  explicit_cache_breakpoints: true
  allow_retention_downgrade: false
  max_breakpoints: 4
  min_cache_tokens: 1024
  expected_reuse: 2
  minimum_value_score: 2048
  min_breakpoint_tokens: 1024

defaults:
  model: "moonbridge-flash"
  max_tokens: 65536

# ============================================================
# 模型定义
# ============================================================
# 关键规则：模型的 key（即下面 "deepseek-v4-flash" 等名称）
# 会被 RouteEntry.Model 直接作为上游模型名发送给 Provider 的 API。
# 所以 model key 必须和上游 API 要求的模型 ID 完全一致！
#
# 例如：
#   - DeepSeek API 要求 model="deepseek-chat" → key 设为 deepseek-chat
#   - 九天 API 要求 model="deepseek/deepseek-v3" → key 设为 "deepseek/deepseek-v3"
#
# 如果 model key 与上游不匹配，会导致 401/404 等错误。
models:
  # ===== Provider A：自有 DeepSeek Key（Anthropic 兼容协议）=====
  deepseek-v4-flash:
    context_window: 1000000
    max_output_tokens: 384000
    display_name: "DeepSeek V4 Flash"
    description: "DeepSeek V4 Flash - 284B/13B active, fast & cheap."
    supports_reasoning_summaries: true
    default_reasoning_summary: "auto"
    extensions:
      deepseek_v4:
        enabled: true

  deepseek-v4-pro:
    context_window: 1000000
    max_output_tokens: 384000
    display_name: "DeepSeek V4 Pro"
    description: "DeepSeek V4 Pro with high/xhigh reasoning effort."
    default_reasoning_level: "high"
    supported_reasoning_levels:
      - effort: "high"
        description: "High reasoning effort"
      - effort: "xhigh"
        description: "Extra high reasoning effort"
    supports_reasoning_summaries: true
    default_reasoning_summary: "auto"
    extensions:
      deepseek_v4:
        enabled: true

  # ===== Provider B：九天（标准 OpenAI 兼容协议）=====
  # 九天要求模型 ID 格式为 "vendor/model-name"，如 "deepseek/deepseek-v3"
  # 注意 YAML 中 key 含 / 时需要用引号包裹
  "deepseek/deepseek-v3":
    context_window: 131072
    max_output_tokens: 16384
    display_name: "DeepSeek V3 (九天)"
    description: "DeepSeek V3 via 九天"

  "deepseek/deepseek-v32":
    context_window: 131072
    max_output_tokens: 16384
    display_name: "DeepSeek V3.2 (九天)"
